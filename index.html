<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Walking Challenge Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #dff6ff, #ffffff);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #2c3e50;
}

h3 {
  color: #2c3e50;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #27ae60;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #219150;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #3498db;
  color: white;
}

img {
  width: 80px;
  border-radius: 6px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.stat-box {
  background: #f0f8ff;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
}

.stat-box h4 {
  margin: 0 0 5px;
  color: #555;
  font-size: 14px;
}

.stat-box span {
  font-size: 22px;
  font-weight: bold;
  color: #2c3e50;
}

.leaderboard-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid #eee;
  align-items: center;
}

.leaderboard-row:last-child {
  border-bottom: none;
}

.leaderboard-rank {
  font-weight: bold;
  color: #3498db;
  width: 30px;
}

.leaderboard-name {
  flex: 1;
}

.leaderboard-steps {
  font-weight: bold;
  color: #27ae60;
}

.medal {
  font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<h2>🚶 Walking Challenge Dashboard</h2>

<!-- FORM -->
<div class="card">
  <select id="name">
    <option value="">Select Participant</option>
    <option>Jayashree V</option>
    <option>Prakash Karath</option>
    <option>Balaji C</option>
    <option>Gabriel Guerra</option>
    <option>P Rima Srudhi</option>
    <option>Praveen Kumar Thirunavukkarasu</option>
    <option>Sergio Delgado</option>
    <option>Syed Khadeer Ahmed</option>
    <option>Venkataraman Rengarajan</option>
  </select>

  <input id="date" type="date">
  <input id="steps" type="number" placeholder="Steps">
  <input id="file" type="file">

  <button onclick="submitSteps()">Submit</button>
</div>

<!-- STATS -->
<div class="card">
  <h3>📈 Overall Stats</h3>
  <div class="stats-grid">
    <div class="stat-box">
      <h4>Total Steps</h4>
      <span id="statTotalSteps">0</span>
    </div>
    <div class="stat-box">
      <h4>Total Entries</h4>
      <span id="statTotalEntries">0</span>
    </div>
    <div class="stat-box">
      <h4>Top Walker</h4>
      <span id="statTopWalker">-</span>
    </div>
    <div class="stat-box">
      <h4>Avg Steps/Entry</h4>
      <span id="statAvgSteps">0</span>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="card">
  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<!-- CHART -->
<div class="card">
  <h3>📊 Steps by Participant</h3>
  <canvas id="stepsChart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
  <h3>📋 Daily Entries</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Steps</th>
        <th>Screenshot</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxEje38TRs858aEOviPCNIY-IKxihSRI0xX3EpAnlzxFKFwn1bRAyP3Qn2eKfBGitw4Qw/exec";

let stepsChart = null;

window.onload = () => {
  loadData();
};

async function submitSteps(){
  const file = document.getElementById('file').files[0];

  if(!file){
    alert("Please upload screenshot");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result.split(',')[1];

    const payload = {
      name: document.getElementById('name').value,
      date: document.getElementById('date').value,
      steps: document.getElementById('steps').value,
      fileName: file.name,
      mimeType: file.type,
      image: base64
    };

    await fetch(API, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    alert("Submitted successfully!");
    loadData();
  };

  reader.readAsDataURL(file);
}

async function loadData(){
  const res = await fetch(API);
  const data = await res.json();

  // Render table
  let html = "";
  data.forEach(row => {
    const d = new Date(row.date);
    const dateStr = isNaN(d) ? row.date : d.toLocaleDateString('en-GB');
    html += `
      <tr>
        <td>${row.name}</td>
        <td>${dateStr}</td>
        <td>${row.steps}</td>
        <td><img src="${row.image}" /></td>
      </tr>
    `;
  });
  document.getElementById("tableBody").innerHTML = html;

  // Calculate totals per participant
  const totals = {};
  let totalSteps = 0;

  data.forEach(row => {
    const steps = Number(row.steps) || 0;
    totals[row.name] = (totals[row.name] || 0) + steps;
    totalSteps += steps;
  });

  // Stats
  const entries = data.length;
  const avgSteps = entries ? Math.round(totalSteps / entries) : 0;
  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const topWalker = sorted.length ? sorted[0][0] : "-";

  document.getElementById("statTotalSteps").textContent = totalSteps.toLocaleString();
  document.getElementById("statTotalEntries").textContent = entries;
  document.getElementById("statTopWalker").textContent = topWalker;
  document.getElementById("statAvgSteps").textContent = avgSteps.toLocaleString();

  // Leaderboard
  const medals = ["🥇", "🥈", "🥉"];
  let lbHtml = "";
  sorted.forEach((item, i) => {
    const medal = i < 3 ? `<span class="medal">${medals[i]}</span>` : `<span class="leaderboard-rank">${i + 1}</span>`;
    lbHtml += `
      <div class="leaderboard-row">
        ${medal}
        <span class="leaderboard-name">${item[0]}</span>
        <span class="leaderboard-steps">${item[1].toLocaleString()} steps</span>
      </div>
    `;
  });
  document.getElementById("leaderboard").innerHTML = lbHtml;

  // Chart
  const labels = sorted.map(s => s[0]);
  const values = sorted.map(s => s[1]);
  const colors = ['#e74c3c','#3498db','#27ae60','#f39c12','#9b59b6','#1abc9c','#e67e22','#2980b9','#d35400'];

  if (stepsChart) stepsChart.destroy();

  stepsChart = new Chart(document.getElementById("stepsChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Total Steps",
        data: values,
        backgroundColor: colors.slice(0, labels.length)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

</script>

</body>
</html>
